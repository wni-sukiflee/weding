<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Asyah &amp; Sukiflee · 26 July 2026</title>
<meta name="description" content="การ์ดเชิญงานแต่งงานของ Asyah &amp; Sukiflee · 26 กรกฎาคม 2026 · Baroh, Yaha, Yala">
<meta name="theme-color" content="#d18d8b">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

<!-- Open Graph (Line, Facebook, WhatsApp link preview) -->
<meta property="og:type" content="website">
<meta property="og:title" content="Asyah & Sukiflee · 26 July 2026">
<meta property="og:description" content="ร่วมเป็นเกียรติในงานวาลีมะห์ของเรา · Baroh, Yaha, Yala">
<meta property="og:locale" content="th_TH">
<meta name="twitter:card" content="summary">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Italiana&family=Cinzel:wght@400;500;600&family=Noto+Serif+Thai:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fdf9f0;
    --cream-2:#f7ecd9;
    --cream-3:#f0dec0;
    --paper:#fefcf6;
    --ink:#5d4a3a;
    --ink-soft:#8a7560;
    --ink-mute:#b8a890;
    --line:rgba(196,168,130,.32);
    --gold:#d8b078;
    --gold-deep:#b58756;
    --gold-light:#ecd2a8;
    --gold-shine:#f7e4be;
    --rose:#eab5b3;
    --rose-deep:#d18d8b;
    --sage:#b5cba5;
    --sage-deep:#8aa878;
    --peach:#f6c4a0;
    --peach-deep:#dca080;
    --burgundy:#c98686;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;
    color:var(--ink);
    background:var(--cream);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    overflow-x:hidden;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }

  /* shared text */
  .eyebrow{
    font-family:"Cinzel","Noto Serif Thai",serif;
    letter-spacing:.5em;
    font-size:11px;text-transform:uppercase;
    color:var(--rose-deep);
    font-weight:500;
  }
  .eyebrow.th{
    font-family:"Noto Serif Thai","Cinzel",serif;
    letter-spacing:.08em;
    font-size:13px;
    text-transform:none;
    font-weight:500;
    color:var(--rose-deep);
  }
  .btn.th{
    letter-spacing:.04em;
    text-transform:none;
    font-family:"Noto Serif Thai","Cinzel",serif;
    font-size:13px;
    padding:13px 22px;
    font-weight:500;
  }
  .display{
    font-family:"Italiana","Noto Serif Thai","Cormorant Garamond",serif;
    font-weight:400;
    color:var(--ink);
    line-height:1.15;
    letter-spacing:-.005em;
  }
  .italic{
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;
    font-style:italic;
    font-weight:300;
    color:var(--ink-soft);
  }
  .mono-sm{
    font-family:"Cinzel",serif;
    letter-spacing:.35em;
    font-size:10px;text-transform:uppercase;
    color:var(--gold-deep);
  }

  /* page container — single column */
  main{
    max-width:780px;
    margin:0 auto;
    padding:0 24px;
    position:relative;
    z-index:1;
  }
  body{background:var(--cream)}

  /* Section spacing rhythm */
  section{
    padding:88px 0;
    position:relative;
  }
  section + section{border-top:1px solid var(--line)}
  @media (max-width: 600px){
    section{padding:64px 0}
  }

  /* Ornament divider used between sections */
  .ornament{
    display:flex;align-items:center;justify-content:center;gap:14px;
    color:var(--sage-deep);
    margin:18px auto;
    max-width:280px;
  }
  .ornament .bar{flex:1;height:1px;background:currentColor;opacity:.5}
  .ornament svg{width:20px;height:20px;flex-shrink:0;color:var(--rose-deep)}

  /* ───────────────────────── HERO ───────────────────────── */
  .hero{
    min-height:100vh;
    min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    padding:60px 24px;
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(234,181,179,.22), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(181,203,165,.22), transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(246,196,160,.16), transparent 60%),
      linear-gradient(180deg, var(--paper) 0%, var(--cream) 100%);
  }
  .hero::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.5  0 0 0 0 0.35  0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-size:220px 220px;
    mix-blend-mode:multiply;
    opacity:.55;
  }

  .monogram-circle{
    width:140px;height:140px;
    border-radius:50%;
    border:1.5px solid var(--rose-deep);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:32px;
    position:relative;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,250,245,.95), rgba(247,236,217,.55) 70%);
    box-shadow:
      0 4px 18px rgba(176,106,104,.15),
      0 0 0 1px rgba(254,252,246,.6) inset;
  }
  .monogram-circle::before, .monogram-circle::after{
    content:"";position:absolute;
    width:10px;height:10px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #f5d0ce 0%, #d18d8b 75%);
    box-shadow:0 1px 3px rgba(176,106,104,.3);
  }
  .monogram-circle::before{top:-5px;left:50%;transform:translateX(-50%)}
  .monogram-circle::after{bottom:-5px;left:50%;transform:translateX(-50%)}
  .monogram-circle .m-text{
    font-family:"Italiana",serif;
    font-size:62px;line-height:1;color:var(--ink);
    letter-spacing:-.04em;
    display:flex;align-items:center;gap:6px;
  }
  .monogram-circle .m-text .amp{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    font-size:36px;color:var(--rose-deep);
    transform:translateY(-4px);
  }

  .hero-names{
    font-family:"Italiana","Cormorant Garamond",serif;
    font-weight:400;
    font-size:clamp(56px, 10vw, 110px);
    margin:8px 0;
    line-height:1;
    letter-spacing:.005em;
  }
  .hero-names .amp{
    display:block;
    font-family:"Cormorant Garamond",serif;
    font-style:italic;font-weight:300;
    font-size:.4em;color:var(--rose-deep);
    margin:.08em 0;
    line-height:1;
  }
  .hero-date{
    font-family:"Cinzel",serif;
    letter-spacing:.32em;
    font-size:13px;
    color:var(--ink-soft);
    margin-top:22px;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .hero-loc{
    font-family:"Cormorant Garamond",serif;
    font-style:italic;font-weight:300;
    color:var(--ink-soft);font-size:18px;
    margin-top:6px;
    white-space:nowrap;
  }

  /* Scroll cue */
  .scroll-cue{
    appearance:none;background:transparent;border:0;
    color:var(--rose-deep);
    display:inline-flex;flex-direction:column;align-items:center;gap:8px;
    margin:28px auto 0;
    font-family:"Cinzel",serif;
    font-size:11px;letter-spacing:.4em;text-transform:uppercase;
    cursor:pointer;
    user-select:none;
    animation:cueBob 2.4s ease-in-out infinite;
    padding:8px 16px;
    transition:color .2s;
  }
  .scroll-cue:hover{color:var(--ink)}
  @keyframes cueBob{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(6px)}
  }
  .scroll-cue svg{width:14px;height:14px}

  /* Hero corner florals — fancy bouquets */
  .hero-floral{
    position:absolute;
    width:clamp(160px,22vw,300px);
    height:auto;
    opacity:.95;
    pointer-events:none;
    filter:drop-shadow(0 6px 16px rgba(176,106,104,.15));
    z-index:0;
  }
  .hero-floral-tl{top:-30px;left:-30px;transform:rotate(-8deg)}
  .hero-floral-tr{top:-30px;right:-30px;transform:rotate(8deg) scaleX(-1)}
  .hero-floral-bl{bottom:-20px;left:-30px;transform:rotate(8deg) scaleY(-1)}
  .hero-floral-br{bottom:-20px;right:-30px;transform:rotate(-8deg) scale(-1,-1)}
  @media (max-width: 640px){
    .hero-floral{width:clamp(120px,38vw,180px);opacity:.85}
    .hero-floral-tl,.hero-floral-tr{top:-10px}
    .hero-floral-bl,.hero-floral-br{bottom:-10px}
    .hero-floral-tl,.hero-floral-bl{left:-15px}
    .hero-floral-tr,.hero-floral-br{right:-15px}
  }
  .hero > *:not(.hero-floral){position:relative;z-index:1}

  /* ───────────── Section: Welcome ───────────── */
  .welcome{
    text-align:center;
    position:relative;
  }
  .welcome::before, .welcome::after{
    content:"";position:absolute;width:60%;max-width:280px;height:1px;
    left:50%;transform:translateX(-50%);
    background:linear-gradient(90deg, transparent, var(--line) 40%, var(--line) 60%, transparent);
  }
  .welcome::before{top:0}
  .welcome::after{bottom:0}

  .bismillah-arabic{
    font-family:"Amiri","Scheherazade New","Noto Naskh Arabic","Traditional Arabic",serif;
    font-size:clamp(28px,4.5vw,46px);
    color:var(--ink);
    direction:rtl;
    line-height:1.5;
    margin-bottom:14px;
    font-weight:400;
    background:linear-gradient(180deg, #b58756 0%, #d18d8b 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 2px 8px rgba(216,141,139,.18);
  }
  .bismillah-translit{
    font-family:"Cormorant Garamond",serif;
    font-style:italic;font-weight:400;
    font-size:clamp(15px,1.6vw,18px);
    color:var(--rose-deep);
    letter-spacing:.04em;
    margin-bottom:36px;
    opacity:.85;
  }

  .welcome-divider{
    display:flex;align-items:center;justify-content:center;gap:14px;
    color:var(--sage-deep);
    margin:0 auto 28px;
    max-width:240px;
  }
  .welcome-divider .line{
    flex:1;height:1px;
    background:linear-gradient(90deg, transparent, currentColor, transparent);
    opacity:.55;
  }
  .welcome-divider svg{
    width:22px;height:22px;color:var(--rose-deep);flex-shrink:0;
  }

  .welcome h2.welcome-title{
    font-family:"Italiana","Noto Serif Thai",serif;
    font-size:clamp(34px, 4.5vw, 48px);
    font-weight:400;
    margin:8px 0 28px;
    color:var(--ink);
    line-height:1.2;
    letter-spacing:.005em;
  }
  .welcome-body{
    font-family:"Noto Serif Thai","Cormorant Garamond",serif;
    font-weight:400;
    font-size:clamp(16px, 1.8vw, 19px);
    line-height:1.9;
    color:var(--ink-soft);
    max-width:540px;margin:0 auto;
  }

  .welcome-quote{
    margin:48px auto 0;
    max-width:540px;
    padding:32px 32px 24px;
    background:linear-gradient(180deg, rgba(254,252,246,.7) 0%, rgba(247,236,217,.4) 100%);
    border:1px solid var(--line);
    border-radius:16px;
    position:relative;
    box-shadow:0 6px 20px rgba(176,106,104,.06);
  }
  .welcome-quote::before, .welcome-quote::after{
    content:"";position:absolute;width:36px;height:1px;
    background:var(--rose-deep);opacity:.4;
    top:50%;
  }
  .welcome-quote::before{left:-16px}
  .welcome-quote::after{right:-16px}
  .quote-mark{
    display:block;
    font-family:"Italiana",serif;
    font-size:64px;line-height:.7;
    color:var(--rose);
    margin-bottom:-12px;
    opacity:.7;
  }
  .quote-text{
    display:block;
    font-family:"Noto Serif Thai",serif;
    font-style:normal;font-weight:300;
    font-size:clamp(14px, 1.5vw, 17px);
    line-height:1.9;
    color:var(--ink);
  }
  .quote-source{
    display:block;
    font-family:"Cinzel",serif;
    font-size:11px;letter-spacing:.25em;
    color:var(--rose-deep);
    margin-top:16px;text-transform:uppercase;
  }
  @media (max-width:600px){
    .welcome-quote{padding:26px 22px 22px;margin-top:36px;border-radius:12px}
    .quote-mark{font-size:48px}
    .welcome-quote::before, .welcome-quote::after{display:none}
  }

  /* ───────────── Section: Date & Countdown ───────────── */
  .date-section{text-align:center}
  .big-date{
    display:flex;align-items:stretch;justify-content:center;gap:24px;
    margin:24px 0;
  }
  .big-date .part{
    text-align:center;display:flex;flex-direction:column;align-items:center;
    min-width:120px;
  }
  .big-date .part .label{
    font-family:"Cinzel",serif;
    font-size:10px;letter-spacing:.35em;
    color:var(--gold-deep);
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .big-date .part .value{
    font-family:"Italiana",serif;
    font-size:clamp(56px,7vw,80px);line-height:1;
    color:var(--ink);
  }
  .big-date .part .sub{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    font-size:16px;color:var(--ink-soft);
    margin-top:8px;
  }
  .big-date .divider{
    width:1px;background:var(--line);
    margin:8px 0;
  }
  @media (max-width:600px){
    .big-date{gap:14px}
    .big-date .part{min-width:0}
  }

  /* Countdown */
  .countdown{
    display:flex;justify-content:center;align-items:flex-start;gap:12px;
    margin:32px 0 0;
  }
  .countdown .unit{
    text-align:center;
    flex:1;max-width:100px;min-width:64px;
    padding:18px 8px;
    background:linear-gradient(180deg, rgba(254,252,246,.92) 0%, rgba(247,236,217,.5) 100%);
    border:1px solid var(--line);
    border-radius:12px;
    box-shadow:0 4px 12px rgba(120,80,40,.06), 0 1px 0 rgba(254,252,246,.95) inset;
  }
  .countdown .unit .n{
    font-family:"Italiana",serif;
    font-size:clamp(32px, 4.5vw, 48px);line-height:1;color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  .countdown .unit .l{
    font-family:"Cinzel",serif;
    font-size:9px;letter-spacing:.2em;
    color:var(--gold-deep);
    margin-top:8px;text-transform:uppercase;
  }
  .countdown .colon{
    font-family:"Italiana",serif;
    font-size:32px;color:var(--ink-mute);
    align-self:center;
  }
  .countdown-tag{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    color:var(--ink-soft);font-size:16px;margin-top:14px;
  }

  /* ───────────── Section: Calendar ───────────── */
  .cal-section{text-align:center}
  .calendar{
    max-width:460px;margin:32px auto 0;
    padding:30px 28px 26px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(234,181,179,.16), transparent 60%),
      linear-gradient(180deg, rgba(254,252,246,.92) 0%, rgba(247,236,217,.55) 100%);
    border:1px solid var(--line);
    border-radius:14px;
    text-align:center;
    position:relative;
    box-shadow:0 10px 30px rgba(120,80,40,.08), 0 1px 0 rgba(254,252,246,.9) inset;
  }
  /* corner florals inside calendar */
  .cal-corner{
    position:absolute;width:74px;height:auto;
    opacity:.7;pointer-events:none;z-index:0;
  }
  .cal-corner-tl{top:-10px;left:-10px}
  .cal-corner-tr{top:-10px;right:-10px;transform:scaleX(-1)}
  .cal-corner-bl{bottom:-10px;left:-10px;transform:scaleY(-1)}
  .cal-corner-br{bottom:-10px;right:-10px;transform:scale(-1,-1)}
  .cal-head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:18px;
    position:relative;z-index:1;
  }
  .cal-title{
    display:flex;flex-direction:column;align-items:center;line-height:1.05;
  }
  .cal-title .month{
    font-family:"Italiana","Noto Serif Thai",serif;
    font-size:26px;color:var(--ink);
    letter-spacing:.01em;
  }
  .cal-title .year{
    font-family:"Cormorant Garamond",serif;
    font-style:italic;font-weight:300;
    font-size:13px;color:var(--gold-deep);
    letter-spacing:.3em;
    margin-top:2px;
  }
  .cal-nav{display:flex;gap:6px}
  .cal-nav button{
    appearance:none;border:1px solid var(--line);
    background:rgba(255,255,255,.6);color:var(--gold-deep);
    width:30px;height:30px;border-radius:50%;
    font:600 14px/1 "Cinzel",serif;
    cursor:pointer;transition:background .2s, color .2s, border-color .2s;
  }
  .cal-nav button:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
  .cal-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
    text-align:center;
    position:relative;z-index:1;
  }
  .cal-dow{
    font-family:"Noto Serif Thai","Cinzel",serif;
    font-size:12px;letter-spacing:0;font-weight:500;
    color:var(--sage-deep);
    padding:6px 0 10px;
    border-bottom:1px solid var(--line);
    margin-bottom:4px;
  }
  .cal-cell{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-family:"Cormorant Garamond",serif;
    font-size:16px;color:var(--ink);
    border-radius:50%;
    position:relative;
    transition:background .2s, color .2s;
    cursor:default;
  }
  .cal-cell:not(.muted):not(.event):hover{background:rgba(184,146,77,.10)}
  .cal-cell.muted{opacity:.22}
  .cal-cell.today{
    background:rgba(184,146,77,.15);
    color:var(--ink);font-weight:500;
  }
  .cal-cell.event{
    background:radial-gradient(circle at 30% 25%, #f5d0ce 0%, #eab5b3 40%, #d18d8b 80%, #b06a68 100%);
    color:#fff;
    font-weight:500;
    box-shadow:
      0 1px 0 rgba(255,235,232,.5) inset,
      0 4px 14px rgba(176,106,104,.35),
      0 0 0 2px rgba(255,250,245,.8),
      0 0 0 3px rgba(234,181,179,.55);
    transform:scale(1.08);
    z-index:2;
  }
  .cal-cell.event::before{
    content:"♥";
    position:absolute;top:-15px;left:50%;
    transform:translateX(-50%);
    font-size:14px;color:var(--rose-deep);
    text-shadow:0 1px 2px rgba(255,255,255,.7);
  }
  .cal-cell.event::after{
    content:"";position:absolute;inset:-7px;border-radius:50%;
    border:1px dashed rgba(209,141,139,.65);
    animation:spin 20s linear infinite;
  }
  .cal-footer{
    margin-top:18px;padding-top:14px;
    border-top:1px dashed var(--line);
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;
    font-style:italic;font-weight:300;
    color:var(--ink-soft);font-size:14px;
    display:flex;align-items:center;justify-content:center;gap:8px;
    position:relative;z-index:1;
  }
  .cal-footer .dot{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    background:radial-gradient(circle at 30% 25%, #f5d0ce 0%, #d18d8b 100%);
    box-shadow:0 0 0 2px rgba(234,181,179,.45);
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ───────────── Section: Location ───────────── */
  .loc-section{text-align:center}
  .map-card{
    margin-top:24px;
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--line);
    background:rgba(254,252,246,.7);
    box-shadow:0 10px 28px rgba(120,80,40,.12);
  }
  .map-card iframe{
    display:block;width:100%;height:300px;border:0;
    filter:sepia(.1) saturate(.9);
  }
  .map-foot{
    padding:20px 22px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    text-align:center;
  }
  .map-foot .v-name{
    font-family:"Italiana",serif;font-size:22px;color:var(--ink);
  }
  .map-foot .v-addr{
    font-family:"Cormorant Garamond",serif;font-style:italic;
    font-size:15px;color:var(--ink-soft);
  }
  .map-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

  .btn{
    appearance:none;cursor:pointer;
    font-family:"Cinzel",serif;
    font-size:10px;letter-spacing:.3em;text-transform:uppercase;
    padding:12px 22px;border-radius:999px;
    border:1px solid var(--gold);
    background:rgba(254,252,246,.5);color:var(--ink);
    text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
    transition:transform .2s, background .2s, box-shadow .2s;
    line-height:1.2;
    white-space:nowrap;
  }
  .btn:hover{transform:translateY(-1px);background:rgba(216,176,120,.13);box-shadow:0 4px 12px rgba(120,80,40,.12)}
  .btn.primary{
    background:linear-gradient(180deg, #f5d0ce 0%, #eab5b3 60%, #d18d8b 100%);
    color:#fff;
    box-shadow:0 1px 0 rgba(255,235,232,.55) inset, 0 4px 12px rgba(176,106,104,.28);
    border-color:var(--rose-deep);
    text-shadow:0 1px 0 rgba(140,70,70,.18);
  }
  .btn.primary:hover{
    box-shadow:0 1px 0 rgba(255,235,232,.55) inset, 0 6px 16px rgba(176,106,104,.38);
  }

  /* ───────────── Section: Program ───────────── */
  .prog-section{text-align:center}
  .program{
    max-width:560px;margin:32px auto 0;
    display:flex;flex-direction:column;gap:2px;
    text-align:left;
  }
  .prog-row{
    display:grid;grid-template-columns:80px 1px 1fr;gap:20px;
    padding:20px 0;
    align-items:start;
    border-bottom:1px dashed var(--line);
  }
  .prog-row:last-child{border-bottom:0}
  .prog-time{
    font-family:"Italiana",serif;
    font-size:24px;color:var(--ink);
    text-align:right;
    line-height:1;
    padding-top:4px;
  }
  .prog-bar{background:var(--line);align-self:stretch}
  .prog-body .ttl{
    font-family:"Italiana","Noto Serif Thai",serif;
    font-size:22px;color:var(--ink);
    margin-bottom:6px;
  }
  .prog-body .sub{
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;
    font-style:italic;font-weight:300;
    font-size:15px;color:var(--ink-soft);
    line-height:1.6;
  }

  /* ───────────── Section: RSVP ───────────── */
  .rsvp-section{
    text-align:center;
    background:
      radial-gradient(ellipse at 30% 10%, rgba(234,181,179,.22), transparent 55%),
      radial-gradient(ellipse at 70% 90%, rgba(181,203,165,.18), transparent 55%),
      linear-gradient(180deg, var(--cream-2) 0%, var(--cream-3) 100%);
  }
  .rsvp-section p{
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;font-style:italic;
    color:var(--ink-soft);font-size:18px;line-height:1.7;
    max-width:520px;margin:14px auto 0;
  }
  .rsvp-actions{
    display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
    margin-top:28px;
  }
  /* RSVP form fields */
  .rsvp-form{
    display:flex;flex-direction:column;gap:12px;
    max-width:360px;margin:26px auto 0;
  }
  .rsvp-input{
    font-family:"Noto Serif Thai","Cormorant Garamond",serif;
    font-size:16px;color:var(--ink);
    padding:13px 16px;
    border:1px solid var(--line);border-radius:12px;
    background:rgba(255,255,255,.65);
    text-align:center;
    transition:border-color .2s, box-shadow .2s;
  }
  .rsvp-input::placeholder{color:var(--ink-mute)}
  .rsvp-input:focus{
    outline:none;border-color:var(--rose-deep);
    box-shadow:0 0 0 3px rgba(209,141,139,.15);
  }
  .rsvp-guests{
    display:flex;align-items:center;justify-content:center;gap:12px;
    font-family:"Noto Serif Thai",serif;
    font-size:15px;color:var(--ink-soft);
  }
  .rsvp-num{width:84px;padding:11px 12px}
  .btn:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none}
  .rsvp-thanks{
    font-family:"Noto Serif Thai","Cormorant Garamond",serif;
    font-size:clamp(17px,2vw,20px);line-height:1.85;
    color:var(--ink);
    margin:26px auto 0;max-width:420px;
    padding:26px 28px;
    border:1px solid var(--line);border-radius:16px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(234,181,179,.18), transparent 70%),
      rgba(255,255,255,.55);
    box-shadow:0 6px 20px rgba(176,106,104,.08);
  }
  .rsvp-contact{margin-top:40px}
  .rsvp-contact-title{
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;font-style:italic;
    color:var(--ink-soft);font-size:16px;margin-bottom:16px;
  }
  .rsvp-contact-list{
    display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  }
  .contact-item{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    text-decoration:none;color:var(--ink);
    padding:14px 24px;min-width:180px;
    border:1px solid var(--line);border-radius:14px;
    background:rgba(255,255,255,.5);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .contact-item:hover{
    transform:translateY(-2px);
    border-color:var(--rose-deep);
    box-shadow:0 8px 22px rgba(209,141,139,.18);
  }
  .contact-role{
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;
    font-size:14px;color:var(--ink-soft);
  }
  .contact-phone{
    font-family:ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
    font-size:21px;font-weight:600;
    color:var(--rose-deep);
    letter-spacing:1px;
    font-variant-numeric:tabular-nums;
  }

  /* ───────────── Footer signoff ───────────── */
  .footer{
    text-align:center;padding:72px 24px 96px;
    background:var(--cream);
  }  .footer .signoff{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    color:var(--ink-soft);font-size:18px;
  }
  .footer .names-small{
    font-family:"Italiana",serif;
    color:var(--ink);font-size:24px;margin-top:6px;
  }
  .footer .heart{color:var(--rose-deep);margin:0 6px}
  .footer{
    background:
      radial-gradient(ellipse at 50% 100%, rgba(234,181,179,.18), transparent 60%),
      var(--cream);
  }

  /* ───────────── Intro Cover ───────────── */
  .intro-cover{
    position:fixed;inset:0;z-index:100;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(234,181,179,.32), transparent 55%),
      radial-gradient(ellipse at 80% 85%, rgba(181,203,165,.3), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(246,196,160,.22), transparent 60%),
      linear-gradient(180deg, #fefcf6 0%, #f7ecd9 100%);
    transition: opacity 1s ease, transform 1.2s cubic-bezier(.7,0,.3,1), visibility 0s linear 1.2s;
    overflow:hidden;
  }
  .intro-cover::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.5  0 0 0 0 0.35  0 0 0 0.12 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-size:220px 220px;mix-blend-mode:multiply;opacity:.5;
  }
  .intro-cover.opened{
    opacity:0;
    transform:translateY(-40px) scale(1.04);
    visibility:hidden;
    pointer-events:none;
  }

  .intro-content{
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;
    text-align:center;
    max-width:min(640px, 92vw);
    padding:40px 32px;
    gap:10px;
  }

  .bismillah{
    font-family:"Amiri","Scheherazade New","Noto Naskh Arabic","Traditional Arabic",serif;
    font-size:clamp(22px,3vw,34px);
    color:var(--rose-deep);
    direction:rtl;
    line-height:1.7;
    margin-bottom:10px;
    font-weight:400;
    letter-spacing:0;
    white-space:nowrap;
    max-width:100%;
  }

  .intro-couple{
    font-family:"Italiana","Noto Serif Thai",serif;
    font-size:clamp(38px,6vw,64px);
    color:#5d4a3a;
    letter-spacing:.01em;
    line-height:1;
    margin:0;
  }
  .intro-amp{
    font-family:"Cormorant Garamond",serif;
    font-style:italic;font-weight:300;
    font-size:clamp(30px,4.5vw,44px);
    color:var(--rose-deep);
    line-height:1;
    margin:-2px 0;
  }
  .intro-script{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    font-size:clamp(18px,2.2vw,22px);color:var(--ink-soft);line-height:1.5;
    margin:6px 0 4px;
    max-width:380px;
  }
  /* removed old .intro-couple unified rule */
  .intro-date{
    font-family:"Cinzel",serif;letter-spacing:.35em;font-size:13px;
    color:var(--ink-soft);text-transform:uppercase;
    margin-top:8px;
    white-space:nowrap;
  }
  .intro-eyebrow{
    font-family:"Cinzel",serif;
    letter-spacing:.55em;font-size:11px;
    text-transform:uppercase;color:var(--rose-deep);
    font-weight:500;
  }
  .intro-divider{
    display:flex;align-items:center;gap:12px;color:var(--rose-deep);
    font-family:"Cinzel",serif;letter-spacing:.3em;font-size:11px;
    margin:0;opacity:.85;
  }
  .intro-divider::before, .intro-divider::after{
    content:"";display:block;width:42px;height:1px;
    background:linear-gradient(90deg, transparent, currentColor, transparent);
  }

  /* The wax seal */
  .intro-seal-wrap{
    margin:34px 0 18px;
    cursor:pointer;
    transition:transform .3s ease;
    background:transparent;border:0;padding:0;
    display:flex;flex-direction:column;align-items:center;
    animation:sealFloat 3.6s ease-in-out infinite;
    position:relative;
  }
  /* glow halo behind seal */
  .intro-seal-wrap::before{
    content:"";
    position:absolute;
    width:180px;height:180px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(234,181,179,.45) 0%, rgba(234,181,179,0) 70%);
    z-index:-1;
    animation:glowPulse 3.6s ease-in-out infinite;
  }
  @keyframes glowPulse{
    0%,100%{transform:scale(.85);opacity:.6}
    50%{transform:scale(1.1);opacity:1}
  }
  .intro-seal-wrap:hover{transform:scale(1.04)}
  .intro-seal-wrap:active{transform:scale(.96)}
  @keyframes sealFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-4px)}
  }
  .intro-seal{
    width:128px;height:128px;
    border-radius:50%;
    background:
      radial-gradient(circle at 30% 25%, #f5d0ce 0%, #eab5b3 35%, #d18d8b 70%, #b06a68 100%);
    box-shadow:
      0 1px 0 rgba(255,230,228,.55) inset,
      0 -10px 16px rgba(110,55,55,.22) inset,
      0 12px 28px rgba(176,106,104,.32),
      0 4px 10px rgba(0,0,0,.12);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    clip-path: polygon(
      50% 0%, 58% 3%, 65% 1%, 72% 6%, 80% 4%, 86% 10%, 93% 12%, 96% 20%,
      99% 28%, 97% 36%, 100% 44%, 98% 52%, 100% 60%, 95% 68%, 98% 76%,
      92% 82%, 88% 90%, 80% 93%, 72% 97%, 64% 95%, 56% 99%, 48% 96%,
      40% 99%, 32% 94%, 24% 96%, 18% 90%, 12% 86%, 6% 80%, 3% 72%,
      1% 64%, 4% 56%, 0% 48%, 3% 40%, 1% 32%, 6% 24%, 10% 16%, 16% 10%,
      24% 6%, 32% 4%, 40% 1%
    );
  }
  .intro-seal::after{
    content:"";position:absolute;inset:8% 8% 50% 8%;
    background:radial-gradient(ellipse at center top, rgba(255,255,255,.22), transparent 60%);
    border-radius:50%;pointer-events:none;
  }
  .intro-seal-inner{
    width:78%;height:78%;border-radius:50%;
    border:1.5px solid rgba(176,106,104,.4);
    box-shadow:0 0 0 3px rgba(255,235,232,.55) inset, 0 0 0 4px rgba(176,106,104,.28) inset;
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    text-shadow:0 1px 0 rgba(140,70,70,.4);
    font-family:"Italiana",serif;
    font-size:38px;letter-spacing:-.02em;
    position:relative;
    gap:2px;
  }
  .intro-seal-inner .amp{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    font-size:32px;color:rgba(255,225,225,.92);
    transform:translateY(-2px);
  }
  .intro-seal-ring{
    position:absolute;inset:8%;border-radius:50%;
    background:repeating-conic-gradient(rgba(255,225,225,.4) 0deg 2deg, transparent 2deg 12deg);
    -webkit-mask:radial-gradient(circle, transparent 62%, #000 63%, #000 66%, transparent 67%);
            mask:radial-gradient(circle, transparent 62%, #000 63%, #000 66%, transparent 67%);
    opacity:.7;
  }

  .intro-prompt{
    font-family:"Cinzel",serif;letter-spacing:.4em;font-size:10px;
    color:var(--rose-deep);text-transform:uppercase;
    animation:breathe 2.4s ease-in-out infinite;
    margin-top:4px;
  }
  @keyframes breathe{
    0%,100%{opacity:.55;letter-spacing:.4em}
    50%{opacity:1;letter-spacing:.46em}
  }

  /* corner florals on intro */
  .intro-floral{
    position:absolute;width:clamp(120px,16vw,200px);height:auto;
    opacity:.78;pointer-events:none;
  }
  .intro-floral-tl{top:30px;left:30px}
  .intro-floral-tr{top:30px;right:30px;transform:scaleX(-1)}
  .intro-floral-bl{bottom:30px;left:30px;transform:scaleY(-1)}
  .intro-floral-br{bottom:30px;right:30px;transform:scale(-1,-1)}
  @media (max-width:600px){
    .intro-floral{width:90px}
    .intro-floral-tl,.intro-floral-tr{top:16px}
    .intro-floral-bl,.intro-floral-br{bottom:16px}
    .intro-floral-tl,.intro-floral-bl{left:16px}
    .intro-floral-tr,.intro-floral-br{right:16px}
  }

  /* Fancy bouquets on the intro cover */
  .intro-bouquet{
    position:absolute;
    width:clamp(140px, 20vw, 260px);
    height:auto;
    opacity:.95;
    pointer-events:none;
    z-index:1;
    filter:drop-shadow(0 6px 14px rgba(176,106,104,.15));
  }
  .intro-bouquet-tl{top:-20px;left:-30px;transform:rotate(-8deg)}
  .intro-bouquet-tr{top:-20px;right:-30px;transform:rotate(8deg) scaleX(-1)}
  .intro-bouquet-bl{bottom:-20px;left:-30px;transform:rotate(8deg) scaleY(-1)}
  .intro-bouquet-br{bottom:-20px;right:-30px;transform:rotate(-8deg) scale(-1,-1)}
  @media (max-width: 640px){
    .intro-bouquet{width:clamp(110px, 36vw, 170px);opacity:.85}
    .intro-bouquet-tl,.intro-bouquet-tr{top:-10px}
    .intro-bouquet-bl,.intro-bouquet-br{bottom:-10px}
    .intro-bouquet-tl,.intro-bouquet-bl{left:-15px}
    .intro-bouquet-tr,.intro-bouquet-br{right:-15px}
  }

  /* Sparkles inside intro */
  .intro-sparkles{
    position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden;
  }
  .intro-sparkles .spark{
    position:absolute;
    width:6px;height:6px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff 0%, #f5d0ce 60%, transparent 100%);
    opacity:0;
    animation: sparkFloat 6s ease-in-out infinite;
  }
  @keyframes sparkFloat{
    0%, 100% { opacity:0; transform:translateY(0) scale(.8); }
    20% { opacity:.85; }
    50% { opacity:1; transform:translateY(-20px) scale(1); }
    80% { opacity:.6; }
  }
  .intro-sparkles .s0{top:18%;left:22%;animation-delay:0s}
  .intro-sparkles .s1{top:30%;left:78%;animation-delay:.7s;width:5px;height:5px}
  .intro-sparkles .s2{top:55%;left:14%;animation-delay:1.4s;width:8px;height:8px}
  .intro-sparkles .s3{top:68%;left:84%;animation-delay:2.1s}
  .intro-sparkles .s4{top:42%;left:88%;animation-delay:2.8s;width:5px;height:5px}
  .intro-sparkles .s5{top:78%;left:30%;animation-delay:3.5s;width:7px;height:7px}
  .intro-sparkles .s6{top:25%;left:12%;animation-delay:4.2s}
  .intro-sparkles .s7{top:60%;left:70%;animation-delay:4.9s;width:5px;height:5px}
  .intro-sparkles .s8{top:15%;left:55%;animation-delay:1.8s;width:6px;height:6px;
    background:radial-gradient(circle at 30% 30%, #fff 0%, #d8e5cb 60%, transparent 100%);}
  .intro-sparkles .s9{top:82%;left:60%;animation-delay:3.2s;width:6px;height:6px;
    background:radial-gradient(circle at 30% 30%, #fff 0%, #f6c4a0 60%, transparent 100%);}

  body.intro-active{overflow:hidden}

  /* ───────────── Falling petals ───────────── */
  .fx{position:fixed;inset:0;pointer-events:none;z-index:5;overflow:hidden}
  .petal{
    position:absolute;top:-40px;width:18px;height:18px;
    will-change:transform,opacity;
    opacity:0;
  }
  .petal svg{display:block;width:100%;height:100%}

  /* Music / Tweaks corner is handled by TweaksPanel */

  /* nav anchor bar - subtle top right */
  .topnav{
    position:fixed;top:14px;right:14px;z-index:30;
    display:flex;gap:6px;
    background:rgba(254,252,246,.8);
    backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-radius:999px;
    padding:6px;
    box-shadow:0 4px 14px rgba(120,80,40,.08);
  }
  .topnav a{
    appearance:none;background:transparent;border:0;cursor:pointer;
    text-decoration:none;
    font-family:"Cinzel",serif;
    font-size:9px;letter-spacing:.25em;text-transform:uppercase;
    color:var(--ink-soft);
    padding:6px 12px;border-radius:999px;
    transition:background .2s, color .2s;
  }
  .topnav a:hover{background:rgba(234,181,179,.25);color:var(--rose-deep)}
  @media (max-width:600px){
    .topnav{display:none}
  }

  /* ───────────── Mobile / phone tuning ───────────── */
  @media (max-width: 600px){
    main{padding:0 18px}

    /* Hero */
    .monogram-circle{width:118px;height:118px;margin-bottom:24px}
    .monogram-circle .m-text{font-size:50px}
    .monogram-circle .m-text .amp{font-size:30px}
    .hero-date{letter-spacing:.22em;font-size:12px}
    .hero-loc{white-space:normal}

    /* Date / big-date */
    .big-date{gap:16px;max-width:100%}
    .big-date .part{flex:0 1 auto;min-width:0}
    .big-date .part .value{font-size:clamp(40px,11vw,54px);white-space:nowrap}
    .big-date .part .sub{font-size:13px}

    /* Countdown — let the 4 units share the row instead of overflowing */
    .countdown{gap:5px;margin-top:24px}
    .countdown .unit{min-width:0;padding:14px 3px;border-radius:10px}
    .countdown .colon{font-size:20px}

    /* Program — narrower time column */
    .prog-row{grid-template-columns:58px 1px 1fr;gap:14px;padding:18px 0}
    .prog-time{font-size:20px}
    .prog-body .ttl{font-size:20px}

    /* Map */
    .map-card iframe{height:240px}

    /* RSVP contact cards stack full-width and stay tappable */
    .rsvp-contact-list{flex-direction:column;align-items:stretch;gap:12px}
    .contact-item{min-width:0;width:100%}
  }

  /* Extra-narrow phones (≤360px) */
  @media (max-width: 360px){
    main{padding:0 14px}
    .countdown{gap:4px}
    .countdown .unit{padding:12px 2px}
    .countdown .unit .l{font-size:8px;letter-spacing:.1em}
    .countdown .colon{display:none}
    .big-date{gap:12px}
    .big-date .part .value{font-size:clamp(36px,12vw,46px)}
    .hero-names{font-size:clamp(46px,13vw,60px)}
  }

  /* focus styling */
  button:focus-visible, a:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:6px}
</style>
</head>
