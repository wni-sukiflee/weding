<style>
  :root{
    --cream:#fdf9f0;
    --cream-2:#f7ecd9;
    --paper:#fefcf6;
    --ink:#5d4a3a;
    --ink-soft:#8a7560;
    --line:rgba(196,168,130,.32);
    --gold:#d8b078;
    --gold-deep:#b58756;
    --rose:#eab5b3;
    --rose-deep:#d18d8b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;
    color:var(--ink);
    background:
      radial-gradient(ellipse at 20% 10%, rgba(234,181,179,.28), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(216,176,120,.22), transparent 55%),
      linear-gradient(180deg, var(--paper) 0%, var(--cream-2) 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:48px 24px;
  }
  .wrap{
    width:100%;max-width:760px;text-align:center;
  }
  .eyebrow{
    font-family:"Cinzel",serif;
    letter-spacing:.5em;font-size:11px;
    text-transform:uppercase;color:var(--rose-deep);
    font-weight:500;
  }
  .monogram{
    width:120px;height:120px;border-radius:50%;
    border:1.5px solid var(--rose-deep);
    margin:24px auto 28px;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 30%, rgba(255,250,245,.95), rgba(247,236,217,.55) 70%);
    box-shadow:0 4px 18px rgba(176,106,104,.15),0 0 0 1px rgba(254,252,246,.6) inset;
    font-family:"Italiana",serif;
    font-size:52px;color:var(--ink);letter-spacing:-.04em;
  }
  .monogram .amp{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    font-size:32px;color:var(--rose-deep);margin:0 4px;transform:translateY(-4px);
  }
  h1{
    font-family:"Italiana","Noto Serif Thai",serif;font-weight:400;
    font-size:clamp(44px,7vw,84px);line-height:1.05;margin:0 0 8px;
    color:var(--ink);letter-spacing:.005em;
  }
  h1 .amp{
    display:block;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    font-size:.4em;color:var(--rose-deep);margin:.08em 0;line-height:1;
  }
  .date{
    font-family:"Cinzel",serif;letter-spacing:.32em;font-size:13px;
    color:var(--ink-soft);text-transform:uppercase;margin:18px 0 6px;
  }
  .loc{
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    color:var(--ink-soft);font-size:18px;margin-bottom:36px;
  }
  .choose{
    font-family:"Cinzel",serif;letter-spacing:.4em;font-size:10px;
    color:var(--rose-deep);text-transform:uppercase;
    margin:30px 0 18px;opacity:.85;
  }
  .cards{
    display:grid;gap:18px;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    max-width:640px;margin:0 auto;
  }
  .card{
    display:block;text-decoration:none;color:inherit;
    padding:28px 24px;
    background:linear-gradient(180deg, rgba(254,252,246,.92) 0%, rgba(247,236,217,.55) 100%);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:0 10px 28px rgba(120,80,40,.08),0 1px 0 rgba(254,252,246,.9) inset;
    transition:transform .2s, box-shadow .2s;
    text-align:center;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 16px 36px rgba(120,80,40,.16),0 1px 0 rgba(254,252,246,.9) inset;
  }
  .card .ico{
    font-family:"Italiana",serif;font-size:36px;color:var(--rose-deep);
    margin-bottom:10px;line-height:1;
  }
  .card .ttl{
    font-family:"Italiana",serif;font-size:22px;color:var(--ink);
    margin-bottom:6px;
  }
  .card .desc{
    font-family:"Cormorant Garamond","Noto Serif Thai",serif;font-style:italic;
    font-size:15px;color:var(--ink-soft);line-height:1.55;
  }
  footer{
    margin-top:44px;
    font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;
    color:var(--ink-soft);font-size:14px;
  }
  footer .heart{color:var(--rose-deep);margin:0 4px}
</style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">The Wedding of</div>

    <div class="monogram">A<span class="amp">&amp;</span>S</div>

    <h1>
      Asyah
      <span class="amp">&amp;</span>
      Sukiflee
    </h1>

    <div class="date">18 July 2026</div>
    <div class="loc">Baroh, Yaha, Yala</div>

    <div class="choose">Choose your invitation</div>

    <div class="cards">
      <a class="card" href="Wedding%20Card.html">
        <div class="ico">❀</div>
        <div class="ttl">Scrollable Invitation</div>
        <div class="desc">เลื่อนชมรายละเอียดทั้งหมด — Welcome, Date, Calendar, Location, Program, RSVP</div>
      </a>
      <a class="card" href="Wedding%20Card%20v1%20(Letter).html">
        <div class="ico">✉</div>
        <div class="ttl">Letter Card</div>
        <div class="desc">แบบเปิดจดหมาย กดตราเปิด — แบบเก่าแต่คลาสสิก</div>
      </a>
    </div>

    <footer>
      With love<span class="heart">♥</span>Asyah &amp; Sukiflee
    </footer>
  </main>
</body>
</html>
